<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Deck Synergy Analyzer</title>

    <!-- amCharts core -->
    <script src="https://cdn.amcharts.com/lib/5/index.js"></script>
    <script src="https://cdn.amcharts.com/lib/5/xy.js"></script>
    <script src="https://cdn.amcharts.com/lib/5/themes/Animated.js"></script>

    <style>
        #chartdiv {
            width: 100%;
            height: 500px;
        }
    </style>
</head>

<body>
    <h1>Deck Synergy Analyzer</h1>

    <button onclick="analyzeDeck()">Analyze Deck</button>

    <p><strong>Synergy Score:</strong> <span id="score"></span></p>
    <p><strong>Average Elixir:</strong> <span id="elixir"></span></p>
    <p><strong>Deck Type:</strong> <span id="deckType"></span></p>

    <div id="chartdiv"></div>

    <script src="script.js"></script>
</body>
</html>
